# Pre-commit hooks for Agent Lab. Install with:  pip install pre-commit && pre-commit install
# Requires `ruff` (and pytest for the local gate). Hooks are skipped gracefully
# if their tools are not installed.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Local hard gate: the offline test suite must pass before committing.
  - repo: local
    hooks:
      - id: pytest-offline
        name: pytest (offline smoke suite)
        entry: python -m pytest
        language: system
        pass_filenames: false
        always_run: true
