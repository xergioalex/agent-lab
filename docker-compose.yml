# Optional backends for Agent Lab. The curriculum runs fully OFFLINE without
# these; start them only to exercise the real Qdrant (module 42) and Neo4j
# (module 43) integrations. Env vars mirror .env.example.
#
#   docker compose up -d      # start Qdrant + Neo4j
#   docker compose down       # stop them

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentlab-qdrant
    ports:
      - "6333:6333"   # REST / gRPC HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: agentlab-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt driver
    environment:
      # Override NEO4J_PASSWORD via your shell/.env; default is for LOCAL DEV ONLY.
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-please-change-me}"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data:
