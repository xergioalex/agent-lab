name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Offline test suite
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # HARD GATE: the whole curriculum must run offline (no API keys/services).
      - name: Run offline test suite
        run: python -m pytest

      # Advisory quality gates — do not fail the build (teaching repo).
      - name: Ruff lint
        run: ruff check src tests
        continue-on-error: true

      - name: Mypy type-check (shared library)
        run: mypy src/shared
        continue-on-error: true
